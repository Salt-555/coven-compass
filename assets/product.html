<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coven Compass — Spell Correspondence Toolkit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap');
:root{--cream:#FAF7F2;--cream-dark:#F0EBE3;--gold:#C5A55A;--gold-light:#D4BA7A;--black:#0A0A0A;--charcoal:#2D2D2D;--stone:#6B6560;--stone-light:#9B9590;--purple:#4A3660;--purple-light:#6B5B80}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;font-weight:300;line-height:1.7;color:var(--charcoal);background:var(--cream);-webkit-font-smoothing:antialiased}
.container{max-width:800px;margin:0 auto;padding:0 24px}
h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--black)}
.divider{width:48px;height:1px;background:var(--gold);margin:0 auto}
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--cream-dark);margin-bottom:40px}
.tab{padding:12px 20px;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--stone-light);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif}
.tab:hover{color:var(--stone)}
.tab.active{color:var(--black);border-bottom-color:var(--gold)}
.tab-panel{display:none}
.tab-panel.active{display:block}
input[type="text"],input[type="search"]{width:100%;padding:14px 20px;font-family:'Inter',sans-serif;font-size:14px;font-weight:300;border:1px solid var(--cream-dark);background:white;color:var(--black);border-radius:2px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--gold)}
input::placeholder{color:var(--stone-light)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:16px}
.intention-card{padding:16px;background:white;border:1px solid var(--cream-dark);border-radius:2px;cursor:pointer;transition:all .2s;text-align:center}
.intention-card:hover{border-color:var(--gold);background:#FFFDF8}
.intention-card.selected{border-color:var(--gold);background:#FFFDF8;box-shadow:0 0 0 1px var(--gold)}
.intention-card h3{font-size:15px;margin-bottom:4px}
.intention-card p{font-size:11px;color:var(--stone-light);text-transform:capitalize}
.correspondence-sheet{margin-top:32px}
.sheet-header{text-align:center;margin-bottom:40px}
.sheet-header h2{font-size:32px;margin-bottom:8px}
.sheet-header .subtitle{font-size:13px;color:var(--stone);text-transform:uppercase;letter-spacing:.15em}
.category-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--cream-dark);margin-bottom:32px}
.category{padding:24px;background:white}
.category-label{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.category-items{font-size:14px;color:var(--charcoal);line-height:1.8}
.category-items span{display:inline-block;margin-right:8px}
.search-results{margin-top:24px}
.result-intention{padding:16px;background:white;border:1px solid var(--cream-dark);margin-bottom:8px;border-radius:2px;cursor:pointer;transition:all .2s}
.result-intention:hover{border-color:var(--gold)}
.result-intention h3{font-size:16px;margin-bottom:4px}
.result-intention p{font-size:12px;color:var(--stone)}
.supply-check{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--cream-dark)}
.supply-check input[type="checkbox"]{width:16px;height:16px;accent-color:var(--gold)}
.supply-check label{font-size:14px;cursor:pointer}
.match-results{margin-top:24px}
.match-card{padding:20px;background:white;border:1px solid var(--cream-dark);margin-bottom:8px;border-radius:2px}
.match-card h3{font-size:16px;margin-bottom:4px}
.match-bar{height:4px;background:var(--cream-dark);border-radius:2px;margin-top:8px;overflow:hidden}
.match-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
.match-score{font-size:11px;color:var(--gold);margin-top:4px}
.print-sheet{background:white;padding:48px;max-width:640px;margin:0 auto}
.print-sheet h1{font-size:36px;text-align:center;margin-bottom:8px}
.print-sheet .date{text-align:center;font-size:12px;color:var(--stone-light);margin-bottom:40px}
.print-sheet .category{border-bottom:1px solid var(--cream-dark);padding:16px 0}
.print-sheet .category:last-child{border-bottom:none}
.print-sheet .cat-label{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.print-sheet .cat-items{font-size:14px;color:var(--charcoal)}
.print-sheet .notes{margin-top:32px;padding-top:16px;border-top:1px solid var(--cream-dark)}
.print-sheet .notes h3{font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--stone-light);margin-bottom:8px}
.print-sheet .notes-lines{border-bottom:1px solid var(--cream-dark);height:28px;margin-bottom:28px}
.btn{display:inline-block;padding:12px 28px;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;background:var(--black);color:var(--cream);border:none;cursor:pointer;border-radius:2px;transition:background .2s}
.btn:hover{background:var(--charcoal)}
.btn-outline{background:transparent;color:var(--black);border:1px solid var(--black)}
.btn-outline:hover{background:var(--black);color:var(--cream)}
.hero{text-align:center;padding:80px 0 40px}
.hero h1{font-size:clamp(32px,5vw,48px);margin-bottom:12px}
.hero p{font-size:15px;color:var(--stone);max-width:480px;margin:0 auto 32px}
.hidden{display:none}
@media print{
  body{background:white}
  .no-print{display:none!important}
  .print-sheet{padding:24px}
}
@media(max-width:600px){
  .category-grid{grid-template-columns:1fr}
  .grid{grid-template-columns:1fr 1fr}
  .tab{padding:10px 12px;font-size:10px}
}
</style>
</head>

<div class="no-print">
<div class="hero">
<div class="container">
<h1>Coven Compass</h1>
<div class="divider" style="margin:20px auto"></div>
<p>Every correspondence for your intention, in one place. No subscriptions. No tabs. No flipping through PDFs.</p>
</div>
</div>

<div class="container">
<div class="tab-bar">
<button class="tab active" data-tab="lookup">By Intention</button>
<button class="tab" data-tab="reverse">Reverse Lookup</button>
<button class="tab" data-tab="supplies">What Do I Have</button>
</div>
</div>
</div>

<div class="container">
<div id="tab-lookup" class="tab-panel active">
<input type="search" id="intentionSearch" placeholder="Search intentions... protection, love, prosperity...">
<div class="grid" id="intentionGrid"></div>
<div id="correspondenceSheet" class="correspondence-sheet hidden"></div>
</div>

<div id="tab-reverse" class="tab-panel">
<input type="search" id="reverseSearch" placeholder="Search herbs, crystals, incense... rosemary, amethyst, sage...">
<div id="reverseResults" class="search-results"></div>
</div>

<div id="tab-supplies" class="tab-panel">
<p style="color:var(--stone);margin-bottom:20px;font-size:14px">Check the items you have on hand. We'll find which intentions they align with.</p>
<div id="supplyList"></div>
<div id="matchResults" class="match-results"></div>
</div>
</div>

<div id="printArea" class="hidden">
<div class="print-sheet" id="printSheet"></div>
</div>

// ─── REVERSE INDEX (item -> intentions) ───
const reverseIndex = {};
Object.entries(DB).forEach(([intention, data]) => {
  Object.entries(data).forEach(([category, items]) => {
    if (Array.isArray(items)) {
      items.forEach(item => {
        const key = item.toLowerCase();
        if (!reverseIndex[key]) reverseIndex[key] = [];
        if (!reverseIndex[key].find(r => r.intention === intention)) {
          reverseIndex[key].push({ intention, category });
        }
      });
    }
  });
});

// ─── ALL ITEMS (for supplies mode) ───
const allItems = Object.keys(reverseIndex).sort();

const categories = [
  { key: 'herbs', label: 'Herbs', icon: '\u{1F33F}' },
  { key: 'crystals', label: 'Crystals', icon: '\u{1F48E}' },

// ─── RENDER FUNCTIONS ───
function renderIntentionGrid(filter = '') {
  const grid = document.getElementById('intentionGrid');
  const filtered = Object.keys(DB).filter(k =>
    k.replace(/_/g, ' ').includes(filter.toLowerCase())
  ).sort();
  grid.innerHTML = filtered.map(key => `
    <div class="intention-card" data-intention="${key}">
      <h3>${key.replace(/_/g, ' ')}</h3>
      <p>${DB[key].element || ''} &middot; ${DB[key].day || ''}</p>
    </div>
  `).join('');
  grid.querySelectorAll('.intention-card').forEach(card => {
    card.addEventListener('click', () => showCorrespondence(card.dataset.intention));
  });
}

function showCorrespondence(intention) {
  const data = DB[intention];
  if (!data) return;
  document.querySelectorAll('.intention-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`[data-intention="${intention}"]`);
  if (card) card.classList.add('selected');

  const sheet = document.getElementById('correspondenceSheet');
  sheet.classList.remove('hidden');

  const cats = categories.filter(c => data[c.key]);
  let html = `<div class="sheet-header">
    <div class="subtitle">Spell Correspondences</div>
    <h2>${intention.replace(/_/g, ' ')}</h2>
  </div>
  <div class="category-grid">`;

  cats.forEach(cat => {
    const val = data[cat.key];
    const display = Array.isArray(val) ? val.join(', ') : val;
    html += `<div class="category">
      <div class="category-label">${cat.icon} ${cat.label}</div>
      <div class="category-items">${display}</div>
    </div>`;
  });

  html += `</div>
  <div style="text-align:center;margin-top:16px">
    <button class="btn" onclick="printSpellSheet('${intention}')">Print Spell Sheet</button>
  </div>`;

  sheet.innerHTML = html;
  sheet.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── REVERSE LOOKUP ───
function renderReverseLookup(query = '') {
  const results = document.getElementById('reverseResults');
  if (query.length < 2) { results.innerHTML = '<p style="color:var(--stone-light)">Type at least 2 characters...</p>'; return; }
  const matches = Object.keys(reverseIndex).filter(k => k.includes(query.toLowerCase())).sort();
  if (!matches.length) { results.innerHTML = '<p style="color:var(--stone-light)">No matches found.</p>'; return; }
  results.innerHTML = matches.map(item => {
    const intentions = reverseIndex[item];
    return `<div class="result-intention" onclick="showCorrespondence('${intentions[0].intention}')">
      <h3>${item}</h3>
      <p>Used for: ${intentions.map(r => r.intention.replace(/_/g, ' ')).join(', ')}</p>
    </div>`;
  }).join('');
}

// ─── SUPPLIES MODE ───
function renderSupplyList() {
  const list = document.getElementById('supplyList');
  const herbs = [...new Set(Object.keys(reverseIndex).filter(k => {
    return Object.values(DB).some(d => d.herbs && d.herbs.includes(k));
  }))].sort();
  const crystals = [...new Set(Object.keys(reverseIndex).filter(k => {
    return Object.values(DB).some(d => d.crystals && d.crystals.includes(k));
  }))].sort();

  let html = '<p style="font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:12px">Herbs</p>';
  herbs.forEach(h => {
    html += `<div class="supply-check"><input type="checkbox" id="supply-${h}" data-item="${h}" onchange="calculateMatches()"><label for="supply-${h}">${h}</label></div>`;
  });
  html += '<p style="font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin:24px 0 12px">Crystals</p>';
  crystals.forEach(c => {
    html += `<div class="supply-check"><input type="checkbox" id="supply-${c}" data-item="${c}" onchange="calculateMatches()"><label for="supply-${c}">${c}</label></div>`;
  });
  list.innerHTML = html;
}

function calculateMatches() {
  const checked = [...document.querySelectorAll('#supplyList input:checked')].map(cb => cb.dataset.item);
  const results = document.getElementById('matchResults');
  if (!checked.length) { results.innerHTML = ''; return; }

  const scores = {};
  Object.entries(DB).forEach(([intention, data]) => {
    let score = 0;
    checked.forEach(item => {
      Object.values(data).forEach(val => {
        if (Array.isArray(val) && val.map(v=>v.toLowerCase()).includes(item)) score++;
      });
    });
    if (score > 0) scores[intention] = score;
  });

  const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
  const maxScore = sorted[0] ? sorted[0][1] : 1;

  results.innerHTML = '<p style="font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:16px">Best Matches</p>' +
    sorted.map(([intention, score]) => `
    <div class="match-card" onclick="showCorrespondence('${intention}')">
      <h3>${intention.replace(/_/g, ' ')}</h3>
      <div class="match-bar"><div class="match-fill" style="width:${(score/maxScore)*100}%"></div></div>
      <div class="match-score">${score} item${score>1?'s':''} match</div>
    </div>
  `).join('');
}

// ─── PRINT SPELL SHEET ───
function printSpellSheet(intention) {
  const data = DB[intention];
  if (!data) return;
  const today = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });

  let html = `<h1>${intention.replace(/_/g, ' ')}</h1>
  <div class="date">${today}</div>`;

  categories.forEach(cat => {
    const val = data[cat.key];
    if (!val) return;
    const display = Array.isArray(val) ? val.join(' &middot; ') : val;
    html += `<div class="category">
      <div class="cat-label">${cat.label}</div>
      <div class="cat-items">${display}</div>
    </div>`;
  });

  html += `<div class="notes">
    <h3>Ritual Notes</h3>
    ${'<div class="notes-lines"></div>'.repeat(6)}
  </div>
  <div style="text-align:center;margin-top:24px;font-size:11px;color:var(--stone-light)">
    Generated by Coven Compass &middot; allmind.ai
  </div>`;

  document.getElementById('printSheet').innerHTML = html;
  document.getElementById('printArea').classList.remove('hidden');
  setTimeout(() => { window.print(); }, 200);
}

// ─── INIT ───
try {
  renderIntentionGrid();
  renderSupplyList();
} catch(e) {
  console.error('Init error:', e);
  document.querySelector('.container').innerHTML = '<p style="color:red;padding:20px">Error: ' + e.message + '</p>';
}

  try {
    renderIntentionGrid(e.target.value);
    document.getElementById('correspondenceSheet').classList.add('hidden');
  } catch(err) { console.error('Search error:', err); }
});
document.getElementById('reverseSearch').addEventListener('input', e => {
  try { renderReverseLookup(e.target.value); }
  catch(err) { console.error('Reverse error:', err); }
});
